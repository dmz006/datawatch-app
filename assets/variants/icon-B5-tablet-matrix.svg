<?xml version="1.0" encoding="UTF-8"?>
<!--
  Variant B5 (v2): combines B4's screen-dominant framing with B1's three-arc
  antenna crown, now with animated matrix rain. Tablet-shaped landscape frame.
  Matrix rain characters drift downward with SMIL animations + staggered start
  offsets; each character has its own opacity — no longer just a brighter "head
  glyph" leading convention. Animation is visible in any modern browser that
  renders inline SVG; for the Android launcher we bake a static frame, and the
  Compose splash reproduces the animation in Kotlin (see
  composeApp/.../ui/splash/MatrixSplashScreen.kt).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="datawatch — tablet with matrix rain + antenna arcs (animated)">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241438"/>
      <stop offset="100%" stop-color="#0D0720"/>
    </linearGradient>
    <radialGradient id="screen" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#220F42"/>
      <stop offset="100%" stop-color="#08031A"/>
    </radialGradient>
    <radialGradient id="iris" cx="42%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="80%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
    <linearGradient id="signalFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Less blur so the matrix reads legibly. -->
    <filter id="matrixBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="96" y="172" width="320" height="248" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Background disc -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="#3B0764"
          stroke-width="2" opacity="0.5"/>
  <g stroke="#7C3AED" stroke-width="3" opacity="0.45">
    <line x1="256" y1="14"  x2="256" y2="34"/>
    <line x1="256" y1="478" x2="256" y2="498"/>
    <line x1="14"  y1="256" x2="34"  y2="256"/>
    <line x1="478" y1="256" x2="498" y2="256"/>
  </g>

  <!-- B1-style three-arc antenna crown -->
  <g fill="none" stroke="url(#signalFade)" stroke-linecap="round"
     filter="url(#softGlow)">
    <path d="M 136,122 A 120,120 0 0,1 376,122" stroke-width="6" opacity="0.45"/>
    <path d="M 166,136 A 90,90 0 0,1 346,136"   stroke-width="8" opacity="0.70"/>
    <path d="M 196,150 A 60,60 0 0,1 316,150"   stroke-width="10" opacity="0.95"/>
  </g>

  <!-- Tablet bezel -->
  <rect x="80" y="158" width="352" height="276" rx="28" ry="28"
        fill="url(#bezel)" stroke="#7C3AED" stroke-width="3"/>
  <rect x="236" y="166" width="40" height="4" rx="2" ry="2" fill="#2D1B4E"/>
  <circle cx="256" cy="178" r="2.4" fill="#4C1D95" opacity="0.75"/>

  <!-- Screen recess -->
  <rect x="96" y="186" width="320" height="234" rx="18" ry="18"
        fill="url(#screen)" stroke="#4C1D95" stroke-width="1" opacity="0.95"/>

  <!--
    MATRIX RAIN (animated) — each column is a <g> that translates down the screen
    using SMIL <animateTransform>. Per-character <animate> on opacity gives each
    glyph its own flicker pattern. Characters themselves are a mix of hex, kana-
    like forms, and leaked references ("DATAWATCHER") for texture. The animation
    loops forever; durations and delays are staggered so the columns don't
    pulse in unison.
  -->
  <g clip-path="url(#screenClip)" filter="url(#matrixBlur)"
     font-family="JetBrains Mono, Menlo, monospace" font-size="12"
     letter-spacing="0.4" text-anchor="middle" fill="#A855F7">
    <!-- Column template used by each actual column:
         <g transform="translate(X 0)">
           <g animateTransform on translate Y>
             <text opacity=random animate>...chars...</text>
           </g>
         </g>
    -->

    <!-- column 120 -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -60" to="0 280" dur="5.4s" repeatCount="indefinite"/>
        <text x="120" y="200" fill="#C084FC">
          A<animate attributeName="opacity" values="0.25;0.55;0.3" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="214" fill="#A855F7">
          3<animate attributeName="opacity" values="0.45;0.2;0.5" dur="2.3s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="228" fill="#C084FC">
          F<animate attributeName="opacity" values="0.3;0.55;0.25" dur="1.7s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="242" fill="#A855F7">
          2<animate attributeName="opacity" values="0.5;0.25;0.45" dur="2.1s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="256" fill="#E879F9">
          9<animate attributeName="opacity" values="0.4;0.7;0.35" dur="1.3s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="270" fill="#A855F7">
          C<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.5s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="284" fill="#C084FC">
          1<animate attributeName="opacity" values="0.4;0.2;0.55" dur="1.8s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="298" fill="#A855F7">
          B<animate attributeName="opacity" values="0.3;0.6;0.35" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="120" y="312" fill="#F0ABFC">
          4<animate attributeName="opacity" values="0.55;0.8;0.5" dur="1.5s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 152 -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -80" to="0 260" dur="4.8s" begin="-1.2s" repeatCount="indefinite"/>
        <text x="152" y="196" fill="#A855F7">
          D<animate attributeName="opacity" values="0.35;0.6;0.3" dur="1.6s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="210" fill="#E879F9">
          E<animate attributeName="opacity" values="0.6;0.35;0.7" dur="1.4s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="224" fill="#C084FC">
          A<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.2s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="238" fill="#A855F7">
          D<animate attributeName="opacity" values="0.45;0.25;0.55" dur="1.8s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="252" fill="#C084FC">
          B<animate attributeName="opacity" values="0.3;0.55;0.25" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="266" fill="#A855F7">
          E<animate attributeName="opacity" values="0.5;0.25;0.45" dur="1.7s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="280" fill="#F0ABFC">
          E<animate attributeName="opacity" values="0.6;0.8;0.5" dur="1.3s" repeatCount="indefinite"/>
        </text>
        <text x="152" y="294" fill="#C084FC">
          F<animate attributeName="opacity" values="0.35;0.2;0.5" dur="2.4s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 184 -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -40" to="0 300" dur="6.2s" begin="-0.6s" repeatCount="indefinite"/>
        <text x="184" y="204" fill="#A855F7">
          C<animate attributeName="opacity" values="0.3;0.55;0.25" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="184" y="218" fill="#C084FC">
          A<animate attributeName="opacity" values="0.4;0.2;0.5" dur="2.1s" repeatCount="indefinite"/>
        </text>
        <text x="184" y="232" fill="#E879F9">
          F<animate attributeName="opacity" values="0.55;0.75;0.4" dur="1.5s" repeatCount="indefinite"/>
        </text>
        <text x="184" y="246" fill="#A855F7">
          E<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.3s" repeatCount="indefinite"/>
        </text>
        <text x="184" y="260" fill="#C084FC">
          B<animate attributeName="opacity" values="0.4;0.2;0.55" dur="1.7s" repeatCount="indefinite"/>
        </text>
        <text x="184" y="274" fill="#A855F7">
          A<animate attributeName="opacity" values="0.3;0.6;0.35" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="184" y="288" fill="#F0ABFC">
          B<animate attributeName="opacity" values="0.6;0.8;0.5" dur="1.4s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 216 - sparser so the eye sits clearly on top -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -20" to="0 240" dur="7.0s" begin="-2.1s" repeatCount="indefinite"/>
        <text x="216" y="200" fill="#A855F7">
          0<animate attributeName="opacity" values="0.25;0.5;0.3" dur="2.4s" repeatCount="indefinite"/>
        </text>
        <text x="216" y="214" fill="#C084FC">
          1<animate attributeName="opacity" values="0.35;0.2;0.55" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="216" y="228" fill="#A855F7">
          1<animate attributeName="opacity" values="0.3;0.55;0.25" dur="2.2s" repeatCount="indefinite"/>
        </text>
        <text x="216" y="242" fill="#E879F9">
          0<animate attributeName="opacity" values="0.5;0.7;0.45" dur="1.6s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 296 -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -70" to="0 290" dur="5.0s" begin="-0.3s" repeatCount="indefinite"/>
        <text x="296" y="208" fill="#A855F7">
          7<animate attributeName="opacity" values="0.4;0.6;0.3" dur="1.8s" repeatCount="indefinite"/>
        </text>
        <text x="296" y="222" fill="#C084FC">
          F<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.1s" repeatCount="indefinite"/>
        </text>
        <text x="296" y="236" fill="#E879F9">
          F<animate attributeName="opacity" values="0.6;0.8;0.5" dur="1.4s" repeatCount="indefinite"/>
        </text>
        <text x="296" y="250" fill="#A855F7">
          E<animate attributeName="opacity" values="0.35;0.55;0.3" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="296" y="264" fill="#C084FC">
          B<animate attributeName="opacity" values="0.4;0.2;0.55" dur="2.3s" repeatCount="indefinite"/>
        </text>
        <text x="296" y="278" fill="#A855F7">
          A<animate attributeName="opacity" values="0.3;0.55;0.25" dur="1.7s" repeatCount="indefinite"/>
        </text>
        <text x="296" y="292" fill="#F0ABFC">
          5<animate attributeName="opacity" values="0.55;0.8;0.5" dur="1.3s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 328 -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -100" to="0 260" dur="5.6s" begin="-1.5s" repeatCount="indefinite"/>
        <text x="328" y="194" fill="#A855F7">
          0<animate attributeName="opacity" values="0.3;0.55;0.25" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="328" y="208" fill="#C084FC">
          x<animate attributeName="opacity" values="0.4;0.2;0.5" dur="1.8s" repeatCount="indefinite"/>
        </text>
        <text x="328" y="222" fill="#E879F9">
          D<animate attributeName="opacity" values="0.55;0.75;0.45" dur="1.5s" repeatCount="indefinite"/>
        </text>
        <text x="328" y="236" fill="#A855F7">
          E<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.2s" repeatCount="indefinite"/>
        </text>
        <text x="328" y="250" fill="#C084FC">
          A<animate attributeName="opacity" values="0.4;0.2;0.55" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="328" y="264" fill="#A855F7">
          D<animate attributeName="opacity" values="0.35;0.55;0.3" dur="2.1s" repeatCount="indefinite"/>
        </text>
        <text x="328" y="278" fill="#F0ABFC">
          B<animate attributeName="opacity" values="0.6;0.8;0.5" dur="1.4s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 360 — leaks the "DATAWATCHER" word -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -50" to="0 310" dur="6.8s" begin="-2.7s" repeatCount="indefinite"/>
        <text x="360" y="202" fill="#A855F7">
          D<animate attributeName="opacity" values="0.3;0.55;0.25" dur="1.7s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="216" fill="#C084FC">
          A<animate attributeName="opacity" values="0.4;0.2;0.55" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="230" fill="#A855F7">
          T<animate attributeName="opacity" values="0.35;0.6;0.3" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="244" fill="#E879F9">
          A<animate attributeName="opacity" values="0.5;0.7;0.4" dur="1.5s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="258" fill="#C084FC">
          W<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.3s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="272" fill="#A855F7">
          A<animate attributeName="opacity" values="0.4;0.2;0.55" dur="1.8s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="286" fill="#C084FC">
          T<animate attributeName="opacity" values="0.35;0.55;0.3" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="360" y="300" fill="#F0ABFC">
          C<animate attributeName="opacity" values="0.6;0.85;0.5" dur="1.3s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>

    <!-- column 392 -->
    <g>
      <g>
        <animateTransform attributeName="transform" type="translate"
          from="0 -30" to="0 270" dur="4.6s" begin="-0.9s" repeatCount="indefinite"/>
        <text x="392" y="206" fill="#A855F7">
          F<animate attributeName="opacity" values="0.3;0.55;0.25" dur="1.8s" repeatCount="indefinite"/>
        </text>
        <text x="392" y="220" fill="#C084FC">
          E<animate attributeName="opacity" values="0.4;0.2;0.5" dur="2.1s" repeatCount="indefinite"/>
        </text>
        <text x="392" y="234" fill="#A855F7">
          E<animate attributeName="opacity" values="0.35;0.6;0.3" dur="1.6s" repeatCount="indefinite"/>
        </text>
        <text x="392" y="248" fill="#E879F9">
          D<animate attributeName="opacity" values="0.55;0.75;0.45" dur="1.4s" repeatCount="indefinite"/>
        </text>
        <text x="392" y="262" fill="#C084FC">
          1<animate attributeName="opacity" values="0.3;0.5;0.25" dur="2.0s" repeatCount="indefinite"/>
        </text>
        <text x="392" y="276" fill="#A855F7">
          F<animate attributeName="opacity" values="0.4;0.2;0.55" dur="1.9s" repeatCount="indefinite"/>
        </text>
        <text x="392" y="290" fill="#F0ABFC">
          A<animate attributeName="opacity" values="0.6;0.8;0.5" dur="1.3s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>
  </g>

  <!-- Eye layered on top -->
  <g transform="translate(256, 306)">
    <ellipse cx="0" cy="0" rx="116" ry="74" fill="#080518"
             stroke="#7C3AED" stroke-width="2"/>
    <circle cx="0" cy="0" r="62" fill="url(#iris)"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#A855F7"
            stroke-width="1" opacity="0.45"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#C084FC"
            stroke-width="0.7" opacity="0.35"/>
    <circle cx="0" cy="0" r="26" fill="#04020E"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#7C3AED"
            stroke-width="1" opacity="0.55"/>
    <g stroke="#E879F9" stroke-width="2.8" filter="url(#softGlow)">
      <line x1="0" y1="-20" x2="0" y2="-10"/>
      <line x1="0" y1="10"  x2="0" y2="20"/>
      <line x1="-20" y1="0" x2="-10" y2="0"/>
      <line x1="10"  y1="0" x2="20" y2="0"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#F0ABFC">
      <!-- Subtle pupil pulse to suggest "live" watching. -->
      <animate attributeName="r" values="3.6;4.6;3.6" dur="2.0s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="-28" cy="-18" rx="11" ry="5" fill="#FFFFFF" opacity="0.10"
             transform="rotate(-30 -28 -18)"/>
  </g>

  <!-- Scan line sweep across the screen — slow vertical drift for extra life. -->
  <rect x="96" y="388" width="320" height="2" fill="#7C3AED" opacity="0.35">
    <animate attributeName="y" values="190;418;190" dur="9.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="9.0s" repeatCount="indefinite"/>
  </rect>
</svg>
