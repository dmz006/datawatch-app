name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-bundles:
    name: Build AABs + create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        if: hashFiles('gradlew') != ''
        uses: gradle/actions/setup-gradle@v4
      - name: Build release bundles
        if: hashFiles('gradlew') != ''
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${UPLOAD_KEYSTORE_BASE64:-}" ]; then
            mkdir -p ~/.android
            echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > ~/.android/upload.jks
          fi
          ./gradlew \
            :composeApp:bundlePublicRelease \
            :composeApp:bundleDevRelease \
            :composeApp:assemblePublicRelease \
            --no-daemon --stacktrace

      - name: Compute checksums
        if: hashFiles('gradlew') != ''
        run: |
          shopt -s globstar nullglob
          find composeApp/build/outputs -type f \( -name '*.aab' -o -name '*.apk' -o -name 'mapping.txt' \) -print0 |
            xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        if: hashFiles('gradlew') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/outputs/bundle/**/composeApp-*.aab
            composeApp/build/outputs/apk/**/composeApp-*.apk
            composeApp/build/outputs/mapping/**/mapping.txt
            SHA256SUMS
          generate_release_notes: true

      - name: Placeholder release (pre-scaffold tags)
        if: hashFiles('gradlew') == ''
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Pre-MVP scaffold release. No binaries yet. See `docs/` for design package.
