<?xml version="1.0" encoding="UTF-8"?>
<!--
  Variant B6 v2 — Apollo 8 Earthrise composition.

  Update per user feedback: Earth is now centered horizontally (cx=256), smaller
  (radius ~48, close to the ~10% canvas-diameter that matches the 1968 photo),
  and sits in the upper third of the canvas with clear dark space between it
  and the lunar horizon. Tablet shifts lower to make room; antenna arcs aim
  straight at Earth from the tablet top.

  Narrative: tablet on lunar surface. Earth rises dead-ahead over the horizon.
  Data arcs reach up from the tablet to Earth — datawatch watching Earth from
  the Moon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="datawatch — Earthrise (Earth centered over lunar horizon)">
  <defs>
    <radialGradient id="space" cx="50%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#0A0518"/>
      <stop offset="70%"  stop-color="#05010E"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="moonSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4A413A"/>
      <stop offset="55%"  stop-color="#322A25"/>
      <stop offset="100%" stop-color="#1A1411"/>
    </linearGradient>

    <radialGradient id="earth" cx="38%" cy="36%" r="62%">
      <stop offset="0%"   stop-color="#EAF6FF"/>
      <stop offset="22%"  stop-color="#6AA3D8"/>
      <stop offset="52%"  stop-color="#1E4B88"/>
      <stop offset="85%"  stop-color="#0B2A55"/>
      <stop offset="100%" stop-color="#050F28"/>
    </radialGradient>

    <radialGradient id="earthHalo" cx="50%" cy="50%" r="50%">
      <stop offset="68%"  stop-color="#6AA3D8" stop-opacity="0"/>
      <stop offset="86%"  stop-color="#6AA3D8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6AA3D8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#241438"/>
      <stop offset="100%" stop-color="#0D0720"/>
    </linearGradient>

    <radialGradient id="screen" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#220F42"/>
      <stop offset="100%" stop-color="#08031A"/>
    </radialGradient>

    <radialGradient id="iris" cx="42%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="45%"  stop-color="#7C3AED"/>
      <stop offset="80%"  stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>

    <linearGradient id="signalFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="matrixBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <clipPath id="iconDisc">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>

    <!-- Tablet screen clip stays in sync with tablet position below. -->
    <clipPath id="screenClip">
      <rect x="96" y="296" width="320" height="158" rx="18" ry="18"/>
    </clipPath>

    <!-- Horizon: gentle curve rising left→right suggesting planetary curvature. -->
    <clipPath id="lunarSurfaceClip">
      <path d="M 0,330 Q 256,314 512,338 L 512,512 L 0,512 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconDisc)">
    <!-- Deep space + scatter of tiny stars. -->
    <rect width="512" height="512" fill="url(#space)"/>
    <g fill="#FFFFFF" opacity="0.65">
      <circle cx="38"  cy="48"  r="0.9"/>
      <circle cx="82"  cy="38"  r="0.6"/>
      <circle cx="134" cy="68"  r="1.0"/>
      <circle cx="184" cy="32"  r="0.6"/>
      <circle cx="232" cy="48"  r="0.5"/>
      <circle cx="290" cy="26"  r="0.7"/>
      <circle cx="352" cy="44"  r="1.0"/>
      <circle cx="410" cy="28"  r="0.6"/>
      <circle cx="460" cy="70"  r="0.9"/>
      <circle cx="494" cy="112" r="0.7"/>
      <circle cx="70"  cy="144" r="0.6"/>
      <circle cx="28"  cy="220" r="0.7"/>
      <circle cx="456" cy="180" r="0.8"/>
      <circle cx="484" cy="240" r="0.6"/>
      <circle cx="208" cy="108" r="0.5"/>
      <circle cx="350" cy="120" r="0.6"/>
      <circle cx="120" cy="94"  r="0.4"/>
    </g>

    <!--
      EARTH — centered horizontally (cx=256), positioned in the upper third
      (cy=196) with radius 48 ≈ 9.4% of canvas diameter, matching Apollo 8
      proportions. Sits clearly above the horizon (y=330) with ~86px of dark
      space between Earth's bottom and the horizon.
    -->
    <g>
      <!-- Atmosphere halo — slightly larger, soft cyan glow. -->
      <circle cx="256" cy="196" r="60" fill="url(#earthHalo)"/>
      <!-- Earth body. -->
      <circle cx="256" cy="196" r="48" fill="url(#earth)"/>
      <!-- Continent blobs (impressionistic at this scale). -->
      <g fill="#2E6B3A" opacity="0.75">
        <path d="M 232,182 Q 240,178 248,188 Q 252,198 242,202 Q 232,198 228,190 Z"/>
        <path d="M 256,208 Q 270,202 282,214 Q 288,224 272,228 Q 260,224 254,218 Z"/>
        <path d="M 240,224 Q 248,222 256,232 Q 250,240 240,236 Q 234,230 240,224 Z"/>
      </g>
      <!-- Cloud swirls. -->
      <g fill="#FFFFFF" opacity="0.40">
        <path d="M 222,196 Q 238,184 258,190 Q 248,204 230,204 Z"/>
        <path d="M 272,180 Q 284,184 290,196 Q 282,192 270,188 Z"/>
        <path d="M 246,238 Q 262,232 280,240 Q 266,246 248,244 Z"/>
      </g>
      <!-- Specular highlight (sun angle upper-left). -->
      <ellipse cx="240" cy="176" rx="14" ry="6" fill="#FFFFFF" opacity="0.22"
               transform="rotate(-20 240 176)"/>
    </g>

    <!-- Lunar surface (foreground). Clipped to the horizon curve. -->
    <g clip-path="url(#lunarSurfaceClip)">
      <rect x="0" y="310" width="512" height="202" fill="url(#moonSurface)"/>

      <!-- Craters — rim-lit rings with darker inner ellipses for a 3D read. -->
      <g>
        <ellipse cx="90"  cy="412" rx="38" ry="12" fill="#1C1612" opacity="0.55"/>
        <ellipse cx="90"  cy="410" rx="36" ry="11" fill="none"
                 stroke="#5F5247" stroke-width="1.2" opacity="0.7"/>

        <ellipse cx="200" cy="378" rx="22" ry="7"  fill="#1C1612" opacity="0.55"/>
        <ellipse cx="200" cy="377" rx="21" ry="6"  fill="none"
                 stroke="#5F5247" stroke-width="1" opacity="0.7"/>

        <ellipse cx="146" cy="448" rx="14" ry="5"  fill="#1C1612" opacity="0.55"/>
        <ellipse cx="146" cy="446" rx="13" ry="4"  fill="none"
                 stroke="#5F5247" stroke-width="0.8" opacity="0.7"/>

        <ellipse cx="394" cy="468" rx="46" ry="14" fill="#1C1612" opacity="0.50"/>
        <ellipse cx="394" cy="466" rx="45" ry="13" fill="none"
                 stroke="#5F5247" stroke-width="1.2" opacity="0.7"/>

        <ellipse cx="440" cy="384" rx="20" ry="7"  fill="#1C1612" opacity="0.45"/>
        <ellipse cx="440" cy="382" rx="19" ry="6"  fill="none"
                 stroke="#5F5247" stroke-width="0.8" opacity="0.6"/>

        <ellipse cx="470" cy="420" rx="10" ry="4"  fill="#1C1612" opacity="0.5"/>
        <ellipse cx="254" cy="336" rx="16" ry="5"  fill="#1C1612" opacity="0.5"/>
        <ellipse cx="50"  cy="480" rx="18" ry="6"  fill="#1C1612" opacity="0.5"/>
        <ellipse cx="72"  cy="494" rx="10" ry="3"  fill="#1C1612" opacity="0.5"/>
      </g>

      <!-- Surface regolith dots. -->
      <g fill="#5F5247" opacity="0.35">
        <circle cx="118" cy="360" r="0.9"/>
        <circle cx="160" cy="384" r="0.6"/>
        <circle cx="224" cy="356" r="0.7"/>
        <circle cx="272" cy="382" r="0.6"/>
        <circle cx="312" cy="366" r="0.8"/>
        <circle cx="356" cy="402" r="0.6"/>
        <circle cx="396" cy="358" r="0.7"/>
        <circle cx="76"  cy="440" r="0.6"/>
        <circle cx="234" cy="474" r="0.8"/>
        <circle cx="318" cy="498" r="0.9"/>
      </g>

      <!-- Horizon rim highlight — subtle Earthlight grazing the surface. -->
      <path d="M 0,326 Q 256,310 512,334"
            fill="none" stroke="#7A6657" stroke-width="1.4" opacity="0.55"/>
    </g>

    <!--
      Antenna arcs — emanate from the tablet upward toward Earth. Now centered
      on Earth (cx=256) because the tablet is centered and Earth is centered.
    -->
    <g fill="none" stroke="url(#signalFade)" stroke-linecap="round"
       filter="url(#softGlow)">
      <path d="M 196,266 A 60,60 0 0,1 316,266"   stroke-width="10" opacity="0.95"/>
      <path d="M 166,252 A 90,90 0 0,1 346,252"   stroke-width="8"  opacity="0.70"/>
      <path d="M 136,238 A 120,120 0 0,1 376,238" stroke-width="6"  opacity="0.45"/>
    </g>

    <!--
      Tablet — dropped lower so Earth has room at the top. New vertical range:
      y=300 → y=468, center at y=384 (near the horizon line but slightly above).
      Screen recess adjusted to match (screenClip above).
    -->
    <rect x="80" y="300" width="352" height="168" rx="26" ry="26"
          fill="url(#bezel)" stroke="#7C3AED" stroke-width="3"/>
    <rect x="236" y="308" width="40" height="4" rx="2" ry="2" fill="#2D1B4E"/>
    <circle cx="256" cy="320" r="2.4" fill="#4C1D95" opacity="0.75"/>

    <!-- Screen recess. -->
    <rect x="96" y="326" width="320" height="128" rx="18" ry="18"
          fill="url(#screen)" stroke="#4C1D95" stroke-width="1" opacity="0.95"/>

    <!--
      Matrix rain — static representation (animation lives in B5 + Compose
      splash). Reduced vertical range to fit the shorter screen.
    -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="11"
       letter-spacing="0.4" text-anchor="middle" filter="url(#matrixBlur)">
      <g fill="#A855F7">
        <text x="128" y="352" opacity="0.40">A</text>
        <text x="128" y="366" opacity="0.55">3</text>
        <text x="128" y="380" opacity="0.35">F</text>
        <text x="128" y="394" opacity="0.50">2</text>
        <text x="128" y="408" opacity="0.60">9</text>

        <text x="170" y="344" opacity="0.35">D</text>
        <text x="170" y="358" opacity="0.55">E</text>
        <text x="170" y="372" opacity="0.45">A</text>
        <text x="170" y="386" opacity="0.40">D</text>
        <text x="170" y="400" opacity="0.50">B</text>

        <text x="212" y="354" opacity="0.50">C</text>
        <text x="212" y="368" opacity="0.40">A</text>
        <text x="212" y="382" opacity="0.60">F</text>
        <text x="212" y="396" opacity="0.45">E</text>

        <text x="300" y="348" opacity="0.45">0</text>
        <text x="300" y="362" opacity="0.35">x</text>
        <text x="300" y="376" opacity="0.55">D</text>
        <text x="300" y="390" opacity="0.40">E</text>

        <text x="342" y="340" opacity="0.40">D</text>
        <text x="342" y="354" opacity="0.50">A</text>
        <text x="342" y="368" opacity="0.45">T</text>
        <text x="342" y="382" opacity="0.55">A</text>
        <text x="342" y="396" opacity="0.40">W</text>

        <text x="384" y="358" opacity="0.40">F</text>
        <text x="384" y="372" opacity="0.55">E</text>
        <text x="384" y="386" opacity="0.45">E</text>
        <text x="384" y="400" opacity="0.40">D</text>
      </g>
    </g>

    <!-- Eye — centered on (shorter) screen; scaled to fit. -->
    <g transform="translate(256, 390)">
      <ellipse cx="0" cy="0" rx="100" ry="46" fill="#080518"
               stroke="#7C3AED" stroke-width="2"/>
      <circle cx="0" cy="0" r="40" fill="url(#iris)"/>
      <circle cx="0" cy="0" r="38" fill="none" stroke="#A855F7"
              stroke-width="1" opacity="0.45"/>
      <circle cx="0" cy="0" r="17" fill="#04020E"/>
      <g stroke="#E879F9" stroke-width="2.4" filter="url(#softGlow)">
        <line x1="0" y1="-13" x2="0" y2="-6"/>
        <line x1="0" y1="6"   x2="0" y2="13"/>
        <line x1="-13" y1="0" x2="-6" y2="0"/>
        <line x1="6"   y1="0" x2="13" y2="0"/>
      </g>
      <circle cx="0" cy="0" r="3" fill="#F0ABFC"/>
      <ellipse cx="-22" cy="-12" rx="8" ry="4" fill="#FFFFFF" opacity="0.10"
               transform="rotate(-30 -22 -12)"/>
    </g>
  </g>
</svg>
