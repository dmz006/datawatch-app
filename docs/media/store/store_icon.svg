<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="512" height="512" viewBox="0 0 108 108">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#220F42"/>
      <stop offset="45%"  stop-color="#13072A"/>
      <stop offset="100%" stop-color="#08031A"/>
    </radialGradient>
    <radialGradient id="iris" cx="46%" cy="46%" r="54%" gradientUnits="userSpaceOnUse"
        fx="50" fy="50">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="50%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="url(#bg)"/>

  <!-- Matrix rain — six columns of purple pixel squares, 50% alpha -->
  <g fill="#A855F7" fill-opacity="0.50">
    <!-- col 1 x=22 -->
    <rect x="22" y="16" width="1" height="1"/>
    <rect x="22" y="20" width="1" height="1"/>
    <rect x="22" y="24" width="1" height="1"/>
    <rect x="22" y="28" width="1" height="1"/>
    <rect x="22" y="40" width="1" height="1"/>
    <rect x="22" y="44" width="1" height="1"/>
    <rect x="22" y="48" width="1" height="1"/>
    <rect x="22" y="72" width="1" height="1"/>
    <rect x="22" y="76" width="1" height="1"/>
    <rect x="22" y="80" width="1" height="1"/>
    <rect x="22" y="84" width="1" height="1"/>
    <rect x="22" y="88" width="1" height="1"/>
    <!-- col 2 x=32 -->
    <rect x="32" y="18" width="1" height="1"/>
    <rect x="32" y="22" width="1" height="1"/>
    <rect x="32" y="26" width="1" height="1"/>
    <rect x="32" y="30" width="1" height="1"/>
    <rect x="32" y="34" width="1" height="1"/>
    <rect x="32" y="38" width="1" height="1"/>
    <rect x="32" y="72" width="1" height="1"/>
    <rect x="32" y="76" width="1" height="1"/>
    <rect x="32" y="80" width="1" height="1"/>
    <rect x="32" y="84" width="1" height="1"/>
    <rect x="32" y="88" width="1" height="1"/>
    <rect x="32" y="92" width="1" height="1"/>
    <!-- col 3 x=42 -->
    <rect x="42" y="16" width="1" height="1"/>
    <rect x="42" y="20" width="1" height="1"/>
    <rect x="42" y="24" width="1" height="1"/>
    <rect x="42" y="28" width="1" height="1"/>
    <rect x="42" y="32" width="1" height="1"/>
    <rect x="42" y="36" width="1" height="1"/>
    <rect x="42" y="76" width="1" height="1"/>
    <rect x="42" y="80" width="1" height="1"/>
    <rect x="42" y="84" width="1" height="1"/>
    <rect x="42" y="88" width="1" height="1"/>
    <rect x="42" y="92" width="1" height="1"/>
    <!-- col 4 x=65 -->
    <rect x="65" y="18" width="1" height="1"/>
    <rect x="65" y="22" width="1" height="1"/>
    <rect x="65" y="26" width="1" height="1"/>
    <rect x="65" y="30" width="1" height="1"/>
    <rect x="65" y="34" width="1" height="1"/>
    <rect x="65" y="38" width="1" height="1"/>
    <rect x="65" y="76" width="1" height="1"/>
    <rect x="65" y="80" width="1" height="1"/>
    <rect x="65" y="84" width="1" height="1"/>
    <rect x="65" y="88" width="1" height="1"/>
    <rect x="65" y="92" width="1" height="1"/>
    <!-- col 5 x=75 -->
    <rect x="75" y="16" width="1" height="1"/>
    <rect x="75" y="20" width="1" height="1"/>
    <rect x="75" y="24" width="1" height="1"/>
    <rect x="75" y="28" width="1" height="1"/>
    <rect x="75" y="32" width="1" height="1"/>
    <rect x="75" y="36" width="1" height="1"/>
    <rect x="75" y="72" width="1" height="1"/>
    <rect x="75" y="76" width="1" height="1"/>
    <rect x="75" y="80" width="1" height="1"/>
    <rect x="75" y="84" width="1" height="1"/>
    <rect x="75" y="88" width="1" height="1"/>
    <!-- col 6 x=85 -->
    <rect x="85" y="18" width="1" height="1"/>
    <rect x="85" y="22" width="1" height="1"/>
    <rect x="85" y="26" width="1" height="1"/>
    <rect x="85" y="30" width="1" height="1"/>
    <rect x="85" y="34" width="1" height="1"/>
    <rect x="85" y="38" width="1" height="1"/>
    <rect x="85" y="72" width="1" height="1"/>
    <rect x="85" y="76" width="1" height="1"/>
    <rect x="85" y="80" width="1" height="1"/>
    <rect x="85" y="84" width="1" height="1"/>
    <rect x="85" y="88" width="1" height="1"/>
    <rect x="85" y="92" width="1" height="1"/>
