<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- High-contrast variant: pure black background, bright violet/white eye -->
    <radialGradient id="iris" cx="42%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#C084FC"/>
      <stop offset="75%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
  </defs>

  <!-- Pure black background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- Matrix rain — bright violet on black -->
  <g fill="#A855F7" fill-opacity="0.6">
    <rect x="56"  y="48"  width="6" height="6"/>
    <rect x="56"  y="72"  width="6" height="6"/>
    <rect x="56"  y="96"  width="6" height="6"/>
    <rect x="56"  y="392" width="6" height="6"/>
    <rect x="56"  y="416" width="6" height="6"/>
    <rect x="56"  y="440" width="6" height="6"/>
    <rect x="112" y="40"  width="6" height="6"/>
    <rect x="112" y="64"  width="6" height="6"/>
    <rect x="112" y="88"  width="6" height="6"/>
    <rect x="112" y="400" width="6" height="6"/>
    <rect x="112" y="424" width="6" height="6"/>
    <rect x="112" y="448" width="6" height="6"/>
    <rect x="394" y="48"  width="6" height="6"/>
    <rect x="394" y="72"  width="6" height="6"/>
    <rect x="394" y="96"  width="6" height="6"/>
    <rect x="394" y="392" width="6" height="6"/>
    <rect x="394" y="416" width="6" height="6"/>
    <rect x="394" y="440" width="6" height="6"/>
    <rect x="450" y="40"  width="6" height="6"/>
    <rect x="450" y="64"  width="6" height="6"/>
    <rect x="450" y="88"  width="6" height="6"/>
    <rect x="450" y="400" width="6" height="6"/>
    <rect x="450" y="424" width="6" height="6"/>
    <rect x="450" y="448" width="6" height="6"/>
  </g>

  <!-- Sclera: wide almond, bright violet stroke, very dark fill -->
  <ellipse cx="256" cy="256" rx="190" ry="120" fill="#06000F" stroke="#A855F7" stroke-width="4"/>

  <!-- Iris: r=104 -->
  <circle cx="256" cy="256" r="104" fill="url(#iris)"/>

  <!-- Iris ring details — bright on dark -->
  <circle cx="256" cy="256" r="99"  fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="76"  fill="none" stroke="#E879F9" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Pupil — pure black -->
  <circle cx="256" cy="256" r="42" fill="#000000"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Crosshair — bright pink -->
  <line x1="256" y1="110" x2="256" y2="138" stroke="#F0ABFC" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="374" x2="256" y2="402" stroke="#F0ABFC" stroke-width="5" stroke-linecap="round"/>
  <line x1="110" y1="256" x2="138" y2="256" stroke="#F0ABFC" stroke-width="5" stroke-linecap="round"/>
  <line x1="374" y1="256" x2="402" y2="256" stroke="#F0ABFC" stroke-width="5" stroke-linecap="round"/>

  <!-- Center highlight — bright white -->
  <circle cx="256" cy="256" r="9" fill="#FFFFFF"/>

  <!-- Lens flare -->
  <ellipse cx="214" cy="218" rx="22" ry="10" fill="white" fill-opacity="0.35" transform="rotate(-20 214 218)"/>
</svg>
