  <!-- EYE — centered at (54, 54) -->

  <!-- Sclera (almond) -->
  <ellipse cx="54" cy="54" rx="22" ry="14"
    fill="#080518" stroke="#7C3AED" stroke-width="0.6"/>

  <!-- Iris -->
  <circle cx="54" cy="54" r="12" fill="url(#iris)"/>

  <!-- Iris outer ring -->
  <circle cx="54" cy="54" r="11.4"
    fill="none" stroke="#A855F7" stroke-width="0.4" stroke-opacity="0.5"/>

  <!-- Iris inner ring -->
  <circle cx="54" cy="54" r="8.5"
    fill="none" stroke="#C084FC" stroke-width="0.3" stroke-opacity="0.4"/>

  <!-- Pupil -->
  <circle cx="54" cy="54" r="5" fill="#04020E"/>
  <circle cx="54" cy="54" r="4.6"
    fill="none" stroke="#7C3AED" stroke-width="0.3" stroke-opacity="0.5"/>

  <!-- Crosshair -->
  <line x1="54" y1="49" x2="54" y2="51"
    stroke="#E879F9" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="54" y1="57" x2="54" y2="59"
    stroke="#E879F9" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="49" y1="54" x2="51" y2="54"
    stroke="#E879F9" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="57" y1="54" x2="59" y2="54"
    stroke="#E879F9" stroke-width="0.7" stroke-linecap="round"/>

  <!-- Center highlight -->
  <circle cx="54" cy="54" r="0.9" fill="#F0ABFC"/>

  <!-- Lens glint -->
  <ellipse cx="49" cy="49" rx="2.2" ry="1"
    fill="white" fill-opacity="0.20"/>
