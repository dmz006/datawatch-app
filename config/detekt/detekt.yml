build:
  maxIssues: 0

naming:
  FunctionNaming:
    active: true
    # @Composable functions use PascalCase by convention; exempt them from the
    # camelCase rule. JUnit5 / Kotlin test functions conventionally use backtick
    # names (`should do X when Y`) which also fail camelCase — exclude test source
    # sets so pre-existing test suites don't block the build.
    ignoreAnnotated:
      - 'Composable'
    excludes:
      - '**/test/**'
      - '**/androidTest/**'

style:
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    # Compose UI code is full of dp literals (8.dp, 16.dp, 24.dp). Treating
    # these as "magic" creates noise without safety. Scope the rule to
    # non-UI packages.
    excludes:
      - '**/wear/**'
      - '**/test/**'
      - '**/androidTest/**'
      - '**/ui/**'
      - '**/compose/**'
  ReturnCount:
    max: 4
  MaxLineLength:
    maxLineLength: 140

complexity:
  LongMethod:
    threshold: 80
    # Compose functions are inherently long — layout, state, and event handling
    # all live in one function body. Exempting them matches the same rationale
    # as ignoring MagicNumber and FunctionNaming for Composable functions.
    ignoreAnnotated:
      - 'Composable'
  CyclomaticComplexMethod:
    # Rule triggers at >= threshold; set to 16 so non-Composable functions with
    # exactly 15 branches (the natural upper bound for switch-like dispatchers)
    # are not flagged. Composable functions are excluded entirely.
    threshold: 16
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    # Android Service/Activity/TileService subclasses routinely exceed 11 methods
    # due to lifecycle callbacks alone. Raise the class threshold to 15.
    thresholdInClasses: 15
    thresholdInObjects: 11
    thresholdInInterfaces: 11
    thresholdInFiles: 11
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
