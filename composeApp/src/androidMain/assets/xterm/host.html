<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, maximum-scale=5" />
  <link rel="stylesheet" href="xterm.min.css" />
  <style>
    /* Palette matches PWA internal/server/web/app.js terminal init:
       background #0f1117 (charcoal), foreground #e2e8f0 (slate).
       Compose (`Modifier.imePadding()` on the outer Column) owns the
       WebView's outer pixel size, so we always size to 100% of whatever
       the WebView is given. Using 100dvh would lock to the *outer*
       viewport on Chromium and fight Compose's resize on IME open. */
    html, body {
      background: #0f1117;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Roboto Mono", "Droid Sans Mono", monospace;
    }
    /* Outer scroll container. Horizontal scroll lets a 120-col Claude
       pane display on a 40-char phone viewport (the TUI stays laid out
       at 120 cols; user swipes to see the rest). Vertical scroll is
       suppressed — xterm handles its own scrollback. Matches PWA's
       .output-area rules and fixes parent issue 0393e262 / v0.14.0.
       width + height come from `dwExplicitSize` (Kotlin onSizeChanged) so
       the fit addon measures exactly the available pixel area Compose
       allocated; the top/left/right/bottom = 0 fallback covers the brief
       window before the first onSizeChanged callback. */
    #term {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0;
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
    }
    /* Box-sizing reset override — known xterm.js issue #1283 when a
       global `* { box-sizing: border-box }` is active. Even though we
       don't set such a reset, assert content-box here defensively so
       future style additions can't break xterm's internal metrics. */
    #term .xterm,
    #term .xterm *,
    #term .xterm *::before,
    #term .xterm *::after {
      box-sizing: content-box;
      margin: initial;
      padding: initial;
    }
    /* width: fit-content lets horizontal scroll expose content past
       the container width; min-width: 100% keeps the background fill
       when content is narrower. Mirrors PWA app.js terminal layout. */
    #term .xterm {
      height: 100%;
      min-width: 100%;
      width: fit-content;
    }
    .xterm-viewport {
      background-color: #0f1117 !important;
      scrollbar-width: none;         /* Firefox */
      /* Lock vertical swipe so users can't scroll through scrollback
         unless they've explicitly entered tmux scroll mode, AND let
         horizontal touches bubble up to #term (which has overflow-x:
         auto) so users can pan across a 120-col claude pane on a
         ~55-col phone viewport. touch-action:none means "this element
         doesn't handle any touch gesture itself, pass the event up."
         Our earlier `pan-x` was wrong: it made xterm-viewport CAPTURE
         horizontal gestures and then do nothing with them (xterm-
         viewport has no horizontal overflow of its own), so #term's
         natural scroll never saw the touch. (B27 terminal scroll.) */
      touch-action: none;
      overflow-y: hidden !important;
    }
    .xterm-viewport::-webkit-scrollbar {
      display: none;                 /* Chromium / WebView */
    }
    .xterm-rows { font-size: 9px !important; }
  </style>
</head>
<body>
  <div id="term"></div>
  <script src="xterm.min.js"></script>
  <script src="xterm-addon-fit.min.js"></script>
  <script src="xterm-addon-search.min.js"></script>
  <script>
    function log(msg) {
      try { console.log('[dw]', msg); } catch (e) {}
    }

    // Terminal options byte-for-byte aligned with PWA app.js line 2010+
    // so TUIs (Claude Code, top, vim) render identically across web and
    // phone. Keep the palette literally the same — diverging even one
    // colour breaks syntax-highlighted output's consistency.
    var term = new Terminal({
      cursorBlink: true,
      // PWA defaults to 9px which is a desktop/web size — on a
      // 440-dp phone screen that renders single-pixel text that's
      // unreadable without zoom. 11 is the mobile-friendly default
      // we land at; user can still step up/down via the toolbar A+
      // which persists to localStorage (persisted key mirrors PWA's
      // `cs_term_font_size`).
      fontSize: 9,
      lineHeight: 1.2,
      fontFamily: '"Roboto Mono", "Droid Sans Mono", monospace',
      rows: 24,
      cols: 80,
      theme: {
        background: '#0f1117',
        foreground: '#e2e8f0',
        cursor: '#a855f7',
        cursorAccent: '#0f1117',
        selectionBackground: 'rgba(168,85,247,0.3)',
        black:         '#1a1d27',
        red:           '#ef4444',
        green:         '#10b981',
        yellow:        '#f59e0b',
        blue:          '#3b82f6',
        magenta:       '#a855f7',
        cyan:          '#06b6d4',
        white:         '#e2e8f0',
        brightBlack:   '#94a3b8',
        brightRed:     '#f87171',
        brightGreen:   '#34d399',
        brightYellow:  '#fbbf24',
        brightBlue:    '#60a5fa',
        brightMagenta: '#c084fc',
        brightCyan:    '#22d3ee',
        brightWhite:   '#f8fafc'
      },
      scrollback: 5000,
      convertEol: true,
      allowProposedApi: true
    });

    var fit;
    try {
      fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
    } catch (e) {
      log('FitAddon load failed: ' + e);
    }

    // Search addon — v0.11 session power-user parity. Vendored
    // xterm-addon-search@0.13.0 (compatible with xterm@5.3.0 at runtime
    // despite the declared peerDependencies "xterm":"^4.0.0" — the
    // addon API is stable across v4↔v5). See
    // docs/plans/2026-04-20-v0.11-session-power-user.md §Phase 3.
    var search;
    try {
      search = new SearchAddon.SearchAddon();
      term.loadAddon(search);
    } catch (e) {
      log('SearchAddon load failed: ' + e);
    }

    // Default highlight style for search matches.
    var SEARCH_OPTS = {
      decorations: {
        matchBackground: '#7c3aed',
        matchBorder: '#a855f7',
        matchOverviewRuler: '#a855f7',
        activeMatchBackground: '#a855f7',
        activeMatchBorder: '#ffffff',
        activeMatchColorOverviewRuler: '#ffffff'
      }
    };

    var container = document.getElementById('term');
    term.open(container);

    // configCols — minimum terminal width required by the active
    // backend (120 for claude-code per parent v0.14.1). When the
    // container is narrower, we still force `term.resize(configCols,
    // rows)` so claude/TUIs lay out correctly; the container scrolls
    // horizontally. Kotlin side calls `dwSetMinCols()` after reading
    // the session's backend.
    var _configCols = 0;
    var _configRows = 0;
    var _lastCols = 0, _lastRows = 0;
    window.dwSetMinCols = function (cols, rows) {
      _configCols = (typeof cols === 'number' && cols > 0) ? cols : 0;
      _configRows = (typeof rows === 'number' && rows > 0) ? rows : 0;
      safeFit();
    };

    // Pure measurement + fit. No CSS writes here — `dwExplicitSize`
    // (called from Compose's onSizeChanged) is the sole owner of
    // container width/height. Under Compose+imePadding the WebView
    // never actually resizes itself so visualViewport-driven CSS
    // tweaks fired here would race with Compose's resize callback.
    function safeFit() {
      if (!fit) return;
      try {
        // Check if the container has been laid out. Only bail on width since
        // height can legitimately be small when the IME is open (don't skip fit).
        var r = container.getBoundingClientRect();
        if (r.width < 40) {
          log('skip fit: container width too small ' + r.width + 'x' + r.height);
          return;
        }
        // Allow fit even with small height (when keyboard is up) — xterm will
        // render whatever rows fit in the available space.
        fit.fit();
        // Enforce minimum cols when the backend requires it (e.g.
        // claude-code 120). Matches PWA's initXterm resize logic.
        if (_configCols > 0 && term.cols < _configCols) {
          term.resize(_configCols, term.rows);
        }
        if (_configRows > 0 && term.rows < _configRows) {
          term.resize(term.cols, _configRows);
        }
        log('fit ok: ' + term.cols + 'x' + term.rows + ' (px ' + r.width + 'x' + r.height + ')');
        // Notify Kotlin so it can send a `resize_term` WS frame to
        // sync the tmux pane. Only fire when the dimensions actually
        // changed — Kotlin debounces too but filtering here saves
        // cross-boundary traffic.
        if ((term.cols !== _lastCols || term.rows !== _lastRows) &&
            window.DwBridge && DwBridge.onResize) {
          _lastCols = term.cols;
          _lastRows = term.rows;
          try { DwBridge.onResize(term.cols, term.rows); } catch (e) {}
        }
      } catch (e) {
        log('fit error: ' + e);
      }
    }

    // Multi-shot fit — WebView layout isn't stable at `term.open()` time,
    // so retry on rAF + a ladder of delayed ticks until the container has
    // a size. Two extra retries (1200 ms, 2500 ms) cover slow devices where
    // AndroidView reflow hasn't settled by 600 ms.
    requestAnimationFrame(function () {
      safeFit();
      setTimeout(safeFit, 50);
      setTimeout(safeFit, 200);
      setTimeout(safeFit, 600);
      setTimeout(safeFit, 1200);
      setTimeout(safeFit, 2500);
    });

    // Keyboard handling under Compose:
    //   - WindowCompat doesn't expose IME insets to the WebView when
    //     Compose intercepts them via `Modifier.imePadding()`.
    //   - `visualViewport.resize` does not reliably fire in that
    //     configuration — the WebView itself never resizes; Compose
    //     just shrinks the AndroidView around it.
    //   - Therefore the SOLE source of truth for terminal pixel size
    //     is `dwExplicitSize(w, h)` invoked from Kotlin's onSizeChanged
    //     callback in TerminalView.kt. The handler is defined below.
    //
    // We still listen for native resize / load / ResizeObserver as a
    // belt-and-braces signal for the legacy paths (rotation pre-Compose
    // settle, initial layout) — these only trigger a re-fit, never CSS.
    window.addEventListener('resize', safeFit);
    window.addEventListener('load', safeFit);
    if (window.ResizeObserver) {
      try { new ResizeObserver(safeFit).observe(container); }
      catch (e) { log('ResizeObserver failed: ' + e); }
    }

    var opened = true; // term.open already called above

    // dwWrite is a no-op stub kept for forward-compatibility — the
    // terminal is pane_capture-only (single display source T3). Raw
    // PTY output bytes contain fragmentary ANSI state that garbles
    // TUI sessions; pane_capture provides complete, self-consistent
    // screen snapshots. See dmz006/datawatch@0393e262 for history.
    window.dwWrite = function (s) { /* pane_capture-only mode */ };

    window.dwClear = function () {
      try { term.clear(); } catch (e) {}
    };

    window.dwResize = function () { safeFit(); };

    /**
     * Single source of truth for terminal viewport dimensions. Called
     * from `TerminalView.kt`'s `onSizeChanged` whenever the Compose
     * layout gives the WebView a new pixel size — keyboard open/close,
     * rotation, foldable hinge change, etc.
     *
     * Sequence: set CSS dims → rAF (let layout commit) → fit →
     * 350 ms later → fit again (covers slow IME slide animations
     * where the first fit measured a half-animated frame).
     *
     * Deliberately does NOT call term.scrollToBottom: that would yank
     * the user out of tmux server-side copy/scroll-back mode (which
     * isn't mirrored into _scrollMode) and out of any manual scrollback
     * mid-IME-animation. Live-tail snap on session open is already
     * handled by dwPaneCapture's `isFirst=true` path.
     */
    window.dwExplicitSize = function (w, h) {
      container.style.width = w + 'px';
      container.style.height = h + 'px';
      requestAnimationFrame(function () {
        safeFit();
        setTimeout(function () {
          requestAnimationFrame(safeFit);
        }, 350);
      });
    };

    /**
     * Explicit user-driven fit. Distinct from `dwResize` only in
     * intent — both currently delegate to safeFit. Exposed as its own
     * function so the toolbar's "Fit" button can log + future-proof
     * any extra logic (e.g. font-size-aware fit) without changing the
     * resize-observer path.
     */
    window.dwFit = function () {
      safeFit();
      log('user-fit');
    };

    /**
     * Snap the viewport to the bottom of the scrollback. Mirrors PWA
     * `term.scrollToBottom()` — used by the toolbar "Jump to bottom"
     * button when the user scrolled up to read backlog and wants to
     * return to live tail.
     */
    window.dwScrollToBottom = function () {
      try { term.scrollToBottom(); } catch (e) { log('scrollToBottom failed: ' + e); }
    };

    /**
     * Auto fit-to-width — PWA termFitToWidth (app.js line 1890):
     * shrink font size until no horizontal overflow. Iterates from
     * current font size down to a floor of 5. Useful when container
     * is narrower than the enforced configCols (claude 120 on a
     * 39-char phone).
     */
    window.dwAutoFitToWidth = function () {
      try {
        var floor = 5;
        var fs = parseFloat(term.options.fontSize) || 15;
        while (fs > floor) {
          term.options.fontSize = fs;
          safeFit();
          var vp = document.querySelector('.xterm-viewport');
          if (!vp) break;
          if (vp.scrollWidth <= vp.clientWidth + 2) break;
          fs -= 1;
        }
        if (window.DwBridge && DwBridge.onAutoFontSize) {
          try { DwBridge.onAutoFontSize(fs); } catch (e) {}
        }
      } catch (e) {
        log('autoFit failed: ' + e);
      }
    };

    /**
     * Set xterm font size in CSS px and re-fit. Mirrors PWA's
     * `changeTermFontSize(delta)` (app.js ~line 1714). Clamped to
     * a sensible range at the caller (Kotlin side).
     */
    window.dwSetFontSize = function (px) {
      try {
        var n = parseFloat(px);
        if (!isFinite(n) || n <= 0) return;
        term.options.fontSize = n;
        // Row heights are style-bound; nudge xterm + re-fit.
        safeFit();
      } catch (e) {
        log('setFontSize failed: ' + e);
      }
    };

    /**
     * Authoritative pane-capture write — the PWA's terminal display source.
     * Per `internal/server/web/app.js` (lines ~263-294, 303-354 in v4.0.3):
     *
     *   First capture per session: term.reset() then
     *     term.write(lines.join('\r\n'))
     *
     *   Subsequent captures (redraw): prefix with ESC[2J ESC[3J ESC[H
     *     (clear screen + clear scrollback + cursor home) then write,
     *     all batched so xterm renders as one frame.
     *
     * Mobile client used to write raw_output bytes directly; that works
     * for log-mode sessions but breaks TUIs (Claude Code, top, vim) that
     * use absolute cursor positioning sized for a 120-col tmux pane. The
     * pane_capture approach renders the server's already-composited frame
     * so the TUI shows up correctly at any terminal width.
     */
    // pane_capture write pipeline — mirrors PWA app.js lines 316-356:
    //
    //  * 30 fps throttle (skip frames < 33 ms apart) — prevents xterm
    //    buffer overload when the server drains aggressively.
    //  * Skip DATAWATCH_COMPLETE marker frames — transitional state
    //    where the echo fires before the session moves to `complete`;
    //    rendering it flashes the shell prompt.
    //  * Freeze on terminal states — callers can call
    //    `dwSetFrozen(true)` when the session completes/fails/is
    //    killed so further pane_captures don't paint over the final
    //    screenshot.
    var _lastPaneWrite = 0;
    var _frozen = false;
    // Pause pane_capture writes while the user is in tmux scroll/copy-mode.
    // The ESC[2J ESC[3J wipe would reset their scroll position.
    var _scrollMode = false;
    // True when the user has manually scrolled away from the live tail.
    var _userScrolled = false;

    window.dwSetFrozen = function (frozen) { _frozen = !!frozen; };

    // Called by Kotlin when the user enters/exits the 📜 scroll overlay.
    // Pausing writes keeps the terminal frozen at the frame the user wants
    // to read; resuming jumps back to the live tail.
    window.dwSetScrollMode = function (on) {
      _scrollMode = !!on;
      if (!on) {
        _userScrolled = false;
        try { term.scrollToBottom(); } catch (e) {}
      }
    };

    // Detect user-initiated scroll (they scrolled away from live tail).
    term.onScroll(function () {
      var vp = document.querySelector('.xterm-viewport');
      if (!vp) return;
      // User is "at bottom" if within 2px of scrollable end.
      _userScrolled = vp.scrollTop < vp.scrollHeight - vp.clientHeight - 2;
    });

    window.dwPaneCapture = function (linesJson, isFirst) {
      try {
        if (_frozen) return;
        var now = (performance && performance.now) ? performance.now() : Date.now();
        if (_lastPaneWrite && (now - _lastPaneWrite) < 33) return;
        var lines;
        try { lines = JSON.parse(String(linesJson || '[]')); }
        catch (e) { lines = []; }
        if (!Array.isArray(lines) || lines.length === 0) return;
        // In scroll mode the user is reading historical output — don't bail
        // on DATAWATCH_COMPLETE: lines that are just part of the history.
        if (!_scrollMode) {
          for (var i = 0; i < lines.length; i++) {
            if (String(lines[i]).indexOf('DATAWATCH_COMPLETE:') !== -1) return;
          }
        }
        _lastPaneWrite = now;
        var joined = lines.join('\r\n');
        if (isFirst) {
          // Fresh render — user hasn't scrolled yet. Reset the flag now so the
          // onScroll events fired by term.write() don't falsely latch _userScrolled.
          // Use the write callback (fires after xterm flushes the buffer) to
          // scroll to the live tail, overriding any intermediate onScroll state.
          _userScrolled = false;
          term.reset();
          term.write(joined, function () {
            _userScrolled = false;
            if (!_scrollMode) try { term.scrollToBottom(); } catch (e) {}
          });
        } else {
          // ESC[2J clear screen, ESC[3J clear scrollback, ESC[H cursor home
          term.write('\x1b[2J\x1b[3J\x1b[H' + joined);
          // Scroll to tail when not in scroll mode and user hasn't manually scrolled.
          if (!_scrollMode && !_userScrolled) {
            try { term.scrollToBottom(); } catch (e) {}
          }
        }
      } catch (e) {
        log('paneCapture failed: ' + e);
      }
    };

    /**
     * v0.11 search + copy bridge.
     *
     * dwSearchNext / dwSearchPrev run the search addon over the scrollback
     * buffer. Repeat calls with the same query cycle through matches. The
     * addon itself keeps the iterator state; the host bridge is stateless.
     *
     * dwSearchClear removes the highlight decorations so the terminal goes
     * back to normal rendering.
     *
     * dwCopySelection returns the currently-selected text so Kotlin can
     * write it to the Android clipboard — xterm's own `term.getSelection()`
     * is synchronous and inexpensive.
     */
    window.dwSearchNext = function (query) {
      if (!search) return false;
      try { return !!search.findNext(String(query || ''), SEARCH_OPTS); }
      catch (e) { log('searchNext failed: ' + e); return false; }
    };

    window.dwSearchPrev = function (query) {
      if (!search) return false;
      try { return !!search.findPrevious(String(query || ''), SEARCH_OPTS); }
      catch (e) { log('searchPrev failed: ' + e); return false; }
    };

    window.dwSearchClear = function () {
      if (!search) return;
      try { search.clearDecorations(); } catch (e) { log('searchClear failed: ' + e); }
    };

    /**
     * Prepend pre-subscription backlog into xterm — used by the v0.12
     * "Load backlog" button. We can't literally insert lines before
     * existing ones (xterm doesn't support inserting above the current
     * cursor position), so we reset the scrollback, write the backlog
     * first, then the live buffer is rewritten by the next incremental
     * flush. In practice the write path after a reset starts from
     * lastWrittenIndex = 0 on the Kotlin side via its own LaunchedEffect
     * retrigger, so this is safe as long as callers invoke it immediately
     * after opening a session — which is the UX we expose.
     *
     * Returns the char count written for log/debug.
     */
    window.dwPrependBacklog = function (s) {
      try {
        term.reset();
        var str = String(s || '');
        // Normalise newlines to CRLF so xterm gives us distinct rows.
        str = str.replace(/\r?\n/g, '\r\n');
        term.write(str);
        return str.length;
      } catch (e) {
        log('prependBacklog failed: ' + e);
        return 0;
      }
    };

    window.dwCopySelection = function () {
      try {
        var sel = term.getSelection();
        return sel == null ? '' : String(sel);
      } catch (e) {
        log('getSelection failed: ' + e);
        return '';
      }
    };

    // Flush anything that was buffered (defensive; unreachable today).
    function flushPending() {
      while (pendingWrites.length > 0) {
        var s = pendingWrites.shift();
        try { term.write(s); } catch (e) { pendingWrites.unshift(s); break; }
      }
    }
    setTimeout(flushPending, 100);

    // Surface terminal-side input back to Kotlin (Sprint 3 — no-op today).
    term.onData(function (data) {
      if (window.DwBridge && DwBridge.onInput) {
        try { DwBridge.onInput(data); } catch (e) {}
      }
    });

    // No pre-output banner — users said the "datawatch terminal ready"
    // line was noise that mangled pane captures on session switch.
    // The xterm container paints black-on-black until output arrives,
    // which is the PWA behaviour.

    if (window.DwBridge && DwBridge.onReady) {
      try { DwBridge.onReady(); } catch (e) {}
    }
    log('host.html loaded');
  </script>
</body>
</html>
