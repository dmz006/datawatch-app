name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Secret requirements (set in repo Settings → Secrets and variables → Actions):
#
#   KEYSTORE_BASE64       base64 of datawatch-upload-ring.jks
#                         `base64 -w0 ~/.android/datawatch-upload-ring.jks`
#   KEYSTORE_PASSWORD     keystore + key password (same value for both)
#   PLAY_PUBLISHER_KEY_JSON  raw JSON content of the Play service account key
#                         `cat ~/.android/datawatch-play-key.json`
#
# Variable (Settings → Secrets and variables → Actions → Variables):
#   PLAY_PUBLISHER_KEY_CONFIGURED   set to 'true' when PLAY_PUBLISHER_KEY_JSON is present

jobs:
  build-bundles:
    name: Build AABs + create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        if: hashFiles('gradlew') != ''
        uses: gradle/actions/setup-gradle@v4

      - name: Write signing keystore
        if: hashFiles('gradlew') != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/datawatch-upload-ring.jks
          fi

      - name: Build release bundles
        if: hashFiles('gradlew') != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew \
            :composeApp:bundlePublicTrackRelease \
            :composeApp:assemblePublicTrackRelease \
            :wear:bundleRelease \
            :wear:assembleRelease \
            --no-daemon --stacktrace

      - name: Compute checksums
        if: hashFiles('gradlew') != ''
        run: |
          find composeApp/build/outputs wear/build/outputs -type f \( -name '*.aab' -o -name '*.apk' -o -name 'mapping.txt' \) -print0 |
            xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        if: hashFiles('gradlew') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/outputs/bundle/**/composeApp-*.aab
            composeApp/build/outputs/apk/**/composeApp-*.apk
            composeApp/build/outputs/mapping/**/mapping.txt
            wear/build/outputs/bundle/**/wear-*.aab
            wear/build/outputs/apk/**/wear-*.apk
            SHA256SUMS
          generate_release_notes: true

      - name: Placeholder release (pre-scaffold tags)
        if: hashFiles('gradlew') == ''
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Pre-MVP scaffold release. No binaries yet. See `docs/` for design package.

  publish-play:
    name: Publish to Play Store internal track
    runs-on: ubuntu-latest
    needs: build-bundles
    # Gate on a repo variable (not a secret — secrets aren't available in job-level
    # if conditions). Set PLAY_PUBLISHER_KEY_CONFIGURED=true in repo Settings →
    # Secrets and variables → Actions → Variables when the Play key is configured.
    if: ${{ vars.PLAY_PUBLISHER_KEY_CONFIGURED == 'true' && needs.build-bundles.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/datawatch-upload-ring.jks

      - name: Write Play service account key
        env:
          PLAY_PUBLISHER_KEY_JSON: ${{ secrets.PLAY_PUBLISHER_KEY_JSON }}
        run: |
          echo "$PLAY_PUBLISHER_KEY_JSON" > "$RUNNER_TEMP/play-key.json"

      - name: Publish to Play Store internal track
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PLAY_PUBLISHER_KEY: ${{ runner.temp }}/play-key.json
        run: |
          set -euo pipefail
          ./gradlew \
            :composeApp:publishPublicTrackReleaseBundle \
            :wear:publishReleaseBundle \
            --no-daemon --stacktrace

      - name: Clean up key file
        if: always()
        run: rm -f "$RUNNER_TEMP/play-key.json"
