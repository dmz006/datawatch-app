<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F1E16"/>
      <stop offset="100%" stop-color="#070E0A"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="45%" cy="38%" r="55%" gradientUnits="userSpaceOnUse"
        fx="220" fy="235" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="50%" stop-color="#00A872"/>
      <stop offset="100%" stop-color="#002E1E"/>
    </radialGradient>
    <!-- matrix rain column glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle matrix rain columns (teal, low alpha) -->
  <g opacity="0.07" fill="#00E5A0" font-family="monospace" font-size="11">
    <!-- col 1 -->
    <text x="40" y="30">1</text><text x="40" y="45">0</text><text x="40" y="60">1</text>
    <text x="40" y="75">1</text><text x="40" y="90">0</text><text x="40" y="105">0</text>
    <text x="40" y="120">1</text><text x="40" y="135">1</text><text x="40" y="150">0</text>
    <!-- col 2 -->
    <text x="60" y="50">0</text><text x="60" y="65">1</text><text x="60" y="80">0</text>
    <text x="60" y="95">1</text><text x="60" y="110">1</text><text x="60" y="125">0</text>
    <text x="60" y="140">1</text><text x="60" y="155">0</text>
    <!-- right side cols -->
    <text x="880" y="340">1</text><text x="880" y="355">0</text><text x="880" y="370">1</text>
    <text x="900" y="360">0</text><text x="900" y="375">1</text><text x="900" y="390">0</text>
    <text x="920" y="380">1</text><text x="920" y="395">0</text><text x="920" y="410">1</text>
    <text x="940" y="400">0</text><text x="940" y="415">1</text><text x="940" y="430">0</text>
    <text x="960" y="350">1</text><text x="960" y="365">0</text><text x="960" y="380">1</text>
    <text x="980" y="370">0</text><text x="980" y="385">1</text><text x="980" y="400">0</text>
  </g>

  <!-- EYE — centered at (270, 250), large: sclera rx=110 ry=68 -->

  <!-- Sclera -->
  <ellipse cx="270" cy="250" rx="110" ry="68"
    fill="#05130C" stroke="#00E5A0" stroke-width="2.5" stroke-opacity="0.55"/>

  <!-- Iris fill -->
  <circle cx="270" cy="250" r="52" fill="url(#irisGrad)"/>

  <!-- Iris outer ring -->
  <circle cx="270" cy="250" r="52"
    fill="none" stroke="#00E5A0" stroke-width="2.5" stroke-opacity="0.9"/>

  <!-- Iris inner detail ring -->
  <circle cx="270" cy="250" r="37"
    fill="none" stroke="#4DFFD4" stroke-width="1" stroke-opacity="0.45"/>

  <!-- Pupil -->
  <circle cx="270" cy="250" r="22" fill="#030A05"/>
  <circle cx="270" cy="250" r="22"
    fill="none" stroke="#00E5A0" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Crosshair -->
  <line x1="270" y1="204" x2="270" y2="225"
    stroke="#00FFB8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="270" y1="275" x2="270" y2="296"
    stroke="#00FFB8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="224" y1="250" x2="245" y2="250"
    stroke="#00FFB8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="295" y1="250" x2="316" y2="250"
    stroke="#00FFB8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center highlight -->
  <circle cx="270" cy="250" r="4.5" fill="#CCFFE8"/>

  <!-- Lens glint -->
  <ellipse cx="244" cy="226" rx="10" ry="5"
    fill="white" fill-opacity="0.28"/>

  <!-- Teal ring glow around eye -->
  <ellipse cx="270" cy="250" rx="116" ry="74"
    fill="none" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.15"/>

  <!-- TEXT RIGHT SIDE -->

  <!-- "datawatch" wordmark -->
  <text x="440" y="236"
    font-family="sans-serif" font-size="82" font-weight="700"
    fill="#00E5A0" letter-spacing="-1">datawatch</text>

  <!-- Tagline -->
  <text x="444" y="284"
    font-family="sans-serif" font-size="26" font-weight="400"
    fill="#9AA7B3" letter-spacing="0.5">AI Session Monitor &amp; Bridge</text>

  <!-- Surfaces row -->
  <g fill="#4DFFD4" font-family="sans-serif" font-size="17" opacity="0.75">
    <text x="444" y="346">📱 Phone</text>
    <text x="570" y="346">⌚ Wear OS</text>
    <text x="710" y="346">🚗 Android Auto</text>
  </g>

  <!-- Subtle bottom accent line -->
  <line x1="440" y1="360" x2="960" y2="360"
    stroke="#00E5A0" stroke-width="1" stroke-opacity="0.2"/>
</svg>
