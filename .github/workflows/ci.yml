name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Verify Version parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure gradle.properties and Version.kt agree
        run: |
          set -euo pipefail
          props_v=$(grep -oP '^DATAWATCH_APP_VERSION=\K.+' gradle.properties)
          props_c=$(grep -oP '^DATAWATCH_APP_VERSION_CODE=\K.+' gradle.properties)
          shared_v=$(grep -oP 'VERSION\s*:\s*String\s*=\s*"\K[^"]+' shared/src/commonMain/kotlin/com/dmzs/datawatchclient/Version.kt)
          shared_c=$(grep -oP 'VERSION_CODE\s*:\s*Int\s*=\s*\K[0-9]+' shared/src/commonMain/kotlin/com/dmzs/datawatchclient/Version.kt)
          echo "gradle.properties: version=$props_v code=$props_c"
          echo "Version.kt:        version=$shared_v code=$shared_c"
          if [ "$props_v" != "$shared_v" ] || [ "$props_c" != "$shared_c" ]; then
            echo "::error::Version mismatch — gradle.properties and Version.kt must agree. Bump both together."
            exit 1
          fi

  build-and-test:
    name: Build + test
    runs-on: ubuntu-latest
    needs: [check-version]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Bootstrap Gradle wrapper if missing (pre-MVP only)
        run: |
          if [ ! -f gradlew ]; then
            echo "::warning::Gradle wrapper not yet committed — pre-Sprint-1 scaffold. Skipping build."
            exit 0
          fi
      - name: Setup Gradle
        if: hashFiles('gradlew') != ''
        uses: gradle/actions/setup-gradle@v4
      - name: Assemble + test
        if: hashFiles('gradlew') != ''
        run: |
          ./gradlew check detekt ktlintCheck --no-daemon --stacktrace

  docs-lint:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc_config.json'
        continue-on-error: true
