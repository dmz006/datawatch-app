<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, maximum-scale=5" />
  <link rel="stylesheet" href="xterm.min.css" />
  <style>
    html, body {
      background: #000000;
      color: #ffffff;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Roboto Mono", "Droid Sans Mono", monospace;
    }
    #term {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 6px;
    }
    .xterm { height: 100%; }
    .xterm-viewport { background-color: #000000 !important; }
    .xterm-rows { font-size: 15px !important; }
  </style>
</head>
<body>
  <div id="term"></div>
  <script src="xterm.min.js"></script>
  <script src="xterm-addon-fit.min.js"></script>
  <script src="xterm-addon-search.min.js"></script>
  <script>
    function log(msg) {
      try { console.log('[dw]', msg); } catch (e) {}
    }

    var term = new Terminal({
      cursorBlink: true,
      fontSize: 15,
      lineHeight: 1.2,
      fontFamily: '"Roboto Mono", "Droid Sans Mono", monospace',
      rows: 24,
      cols: 80,
      theme: {
        background: '#000000',
        foreground: '#ffffff',
        cursor: '#a855f7',
        cursorAccent: '#000000',
        selectionBackground: '#3b1d6b',
        // ANSI colour palette — tuned for contrast on pure black.
        black:         '#000000',
        red:           '#ff6d6d',
        green:         '#8aff80',
        yellow:        '#ffe66d',
        blue:          '#8ab6ff',
        magenta:       '#d080ff',
        cyan:          '#88f0ff',
        white:         '#ffffff',
        brightBlack:   '#888888',
        brightRed:     '#ff9b9b',
        brightGreen:   '#b5ffa8',
        brightYellow:  '#fff19a',
        brightBlue:    '#abc7ff',
        brightMagenta: '#e6a9ff',
        brightCyan:    '#b2f6ff',
        brightWhite:   '#ffffff'
      },
      scrollback: 5000,
      convertEol: true,
      allowProposedApi: true
    });

    var fit;
    try {
      fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
    } catch (e) {
      log('FitAddon load failed: ' + e);
    }

    // Search addon — v0.11 session power-user parity. Vendored
    // xterm-addon-search@0.13.0 (compatible with xterm@5.3.0 at runtime
    // despite the declared peerDependencies "xterm":"^4.0.0" — the
    // addon API is stable across v4↔v5). See
    // docs/plans/2026-04-20-v0.11-session-power-user.md §Phase 3.
    var search;
    try {
      search = new SearchAddon.SearchAddon();
      term.loadAddon(search);
    } catch (e) {
      log('SearchAddon load failed: ' + e);
    }

    // Default highlight style for search matches.
    var SEARCH_OPTS = {
      decorations: {
        matchBackground: '#7c3aed',
        matchBorder: '#a855f7',
        matchOverviewRuler: '#a855f7',
        activeMatchBackground: '#a855f7',
        activeMatchBorder: '#ffffff',
        activeMatchColorOverviewRuler: '#ffffff'
      }
    };

    var container = document.getElementById('term');
    term.open(container);

    function safeFit() {
      if (!fit) return;
      try {
        // Bail if the container hasn't been laid out yet.
        var r = container.getBoundingClientRect();
        if (r.width < 40 || r.height < 40) {
          log('skip fit: container ' + r.width + 'x' + r.height);
          return;
        }
        fit.fit();
        log('fit ok: ' + term.cols + 'x' + term.rows + ' (px ' + r.width + 'x' + r.height + ')');
      } catch (e) {
        log('fit error: ' + e);
      }
    }

    // Multi-shot fit — WebView layout isn't stable at `term.open()` time,
    // so retry on rAF + a ladder of delayed ticks until the container has
    // a size. Two extra retries (1200 ms, 2500 ms) cover slow devices where
    // AndroidView reflow hasn't settled by 600 ms.
    requestAnimationFrame(function () {
      safeFit();
      setTimeout(safeFit, 50);
      setTimeout(safeFit, 200);
      setTimeout(safeFit, 600);
      setTimeout(safeFit, 1200);
      setTimeout(safeFit, 2500);
    });

    // Respond to every resize signal the platform gives us.
    window.addEventListener('resize', safeFit);
    window.addEventListener('load', safeFit);
    if (window.ResizeObserver) {
      try { new ResizeObserver(safeFit).observe(container); }
      catch (e) { log('ResizeObserver failed: ' + e); }
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', safeFit);
    }

    // Writes may arrive from Kotlin before xterm opens; buffer them so nothing
    // gets lost.
    var pendingWrites = [];
    var opened = true; // term.open already called above

    window.dwWrite = function (s) {
      try {
        term.write(s);
      } catch (e) {
        log('write failed, buffering: ' + e);
        pendingWrites.push(s);
      }
    };

    window.dwClear = function () {
      try { term.clear(); } catch (e) {}
    };

    window.dwResize = function () { safeFit(); };

    /**
     * Set xterm font size in CSS px and re-fit. Mirrors PWA's
     * `changeTermFontSize(delta)` (app.js ~line 1714). Clamped to
     * a sensible range at the caller (Kotlin side).
     */
    window.dwSetFontSize = function (px) {
      try {
        var n = parseFloat(px);
        if (!isFinite(n) || n <= 0) return;
        term.options.fontSize = n;
        // Row heights are style-bound; nudge xterm + re-fit.
        safeFit();
      } catch (e) {
        log('setFontSize failed: ' + e);
      }
    };

    /**
     * Authoritative pane-capture write — the PWA's terminal display source.
     * Per `internal/server/web/app.js` (lines ~263-294, 303-354 in v4.0.3):
     *
     *   First capture per session: term.reset() then
     *     term.write(lines.join('\r\n'))
     *
     *   Subsequent captures (redraw): prefix with ESC[2J ESC[3J ESC[H
     *     (clear screen + clear scrollback + cursor home) then write,
     *     all batched so xterm renders as one frame.
     *
     * Mobile client used to write raw_output bytes directly; that works
     * for log-mode sessions but breaks TUIs (Claude Code, top, vim) that
     * use absolute cursor positioning sized for a 120-col tmux pane. The
     * pane_capture approach renders the server's already-composited frame
     * so the TUI shows up correctly at any terminal width.
     */
    window.dwPaneCapture = function (linesJson, isFirst) {
      try {
        var lines;
        try { lines = JSON.parse(String(linesJson || '[]')); }
        catch (e) { lines = []; }
        if (!Array.isArray(lines) || lines.length === 0) return;
        var joined = lines.join('\r\n');
        if (isFirst) {
          term.reset();
          term.write(joined);
        } else {
          // ESC[2J clear screen, ESC[3J clear scrollback, ESC[H cursor home
          term.write('\x1b[2J\x1b[3J\x1b[H' + joined);
        }
      } catch (e) {
        log('paneCapture failed: ' + e);
      }
    };

    /**
     * v0.11 search + copy bridge.
     *
     * dwSearchNext / dwSearchPrev run the search addon over the scrollback
     * buffer. Repeat calls with the same query cycle through matches. The
     * addon itself keeps the iterator state; the host bridge is stateless.
     *
     * dwSearchClear removes the highlight decorations so the terminal goes
     * back to normal rendering.
     *
     * dwCopySelection returns the currently-selected text so Kotlin can
     * write it to the Android clipboard — xterm's own `term.getSelection()`
     * is synchronous and inexpensive.
     */
    window.dwSearchNext = function (query) {
      if (!search) return false;
      try { return !!search.findNext(String(query || ''), SEARCH_OPTS); }
      catch (e) { log('searchNext failed: ' + e); return false; }
    };

    window.dwSearchPrev = function (query) {
      if (!search) return false;
      try { return !!search.findPrevious(String(query || ''), SEARCH_OPTS); }
      catch (e) { log('searchPrev failed: ' + e); return false; }
    };

    window.dwSearchClear = function () {
      if (!search) return;
      try { search.clearDecorations(); } catch (e) { log('searchClear failed: ' + e); }
    };

    /**
     * Prepend pre-subscription backlog into xterm — used by the v0.12
     * "Load backlog" button. We can't literally insert lines before
     * existing ones (xterm doesn't support inserting above the current
     * cursor position), so we reset the scrollback, write the backlog
     * first, then the live buffer is rewritten by the next incremental
     * flush. In practice the write path after a reset starts from
     * lastWrittenIndex = 0 on the Kotlin side via its own LaunchedEffect
     * retrigger, so this is safe as long as callers invoke it immediately
     * after opening a session — which is the UX we expose.
     *
     * Returns the char count written for log/debug.
     */
    window.dwPrependBacklog = function (s) {
      try {
        term.reset();
        var str = String(s || '');
        // Normalise newlines to CRLF so xterm gives us distinct rows.
        str = str.replace(/\r?\n/g, '\r\n');
        term.write(str);
        return str.length;
      } catch (e) {
        log('prependBacklog failed: ' + e);
        return 0;
      }
    };

    window.dwCopySelection = function () {
      try {
        var sel = term.getSelection();
        return sel == null ? '' : String(sel);
      } catch (e) {
        log('getSelection failed: ' + e);
        return '';
      }
    };

    // Flush anything that was buffered (defensive; unreachable today).
    function flushPending() {
      while (pendingWrites.length > 0) {
        var s = pendingWrites.shift();
        try { term.write(s); } catch (e) { pendingWrites.unshift(s); break; }
      }
    }
    setTimeout(flushPending, 100);

    // Surface terminal-side input back to Kotlin (Sprint 3 — no-op today).
    term.onData(function (data) {
      if (window.DwBridge && DwBridge.onInput) {
        try { DwBridge.onInput(data); } catch (e) {}
      }
    });

    // Paint a visible banner so the user sees the terminal is alive even
    // before any output frames arrive. Uses bright-white on a black bg,
    // no dim/italic, so it is unmistakably visible.
    try {
      term.write('\u001b[1;97m datawatch terminal ready \u001b[0m\r\n');
      term.write('\u001b[90m waiting for session output… \u001b[0m\r\n');
    } catch (e) { log('initial write failed: ' + e); }

    if (window.DwBridge && DwBridge.onReady) {
      try { DwBridge.onReady(); } catch (e) {}
    }
    log('host.html loaded');
  </script>
</body>
</html>
