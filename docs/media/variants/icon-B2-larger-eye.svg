<?xml version="1.0" encoding="UTF-8"?>
<!-- Variant B2: eye enlarged to ~60% of screen area; phone narrower to compensate;
     two signal arcs instead of three. The eye becomes the dominant silhouette and
     the phone recedes to a frame. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="datawatch mobile — variant B2 (larger eye)">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <linearGradient id="phoneBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1235"/>
      <stop offset="100%" stop-color="#0D0720"/>
    </linearGradient>
    <radialGradient id="iris" cx="42%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="80%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="#3B0764" stroke-width="2" opacity="0.5"/>

  <!-- two signal arcs, slightly wider -->
  <g fill="none" stroke="#A855F7" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M 176,140 A 80,80 0 0,1 336,140" stroke-width="11" opacity="0.92"/>
    <path d="M 136,126 A 120,120 0 0,1 376,126" stroke-width="7" opacity="0.55"/>
  </g>

  <!-- narrower phone -->
  <rect x="172" y="190" width="168" height="272" rx="32" ry="32"
        fill="url(#phoneBody)" stroke="#7C3AED" stroke-width="3"/>
  <rect x="244" y="206" width="24" height="5" rx="2" ry="2" fill="#2D1B4E"/>
  <rect x="184" y="222" width="144" height="214" rx="14" ry="14"
        fill="#0A0318" stroke="#4C1D95" stroke-width="1"/>
  <rect x="228" y="448" width="56" height="5" rx="2" ry="2" fill="#4C1D95" opacity="0.8"/>

  <!-- ENLARGED eye -->
  <g transform="translate(256, 329)">
    <ellipse cx="0" cy="0" rx="66" ry="70" fill="#080518"
             stroke="#7C3AED" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="54" fill="url(#iris)"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.45"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C084FC" stroke-width="0.7" opacity="0.35"/>
    <circle cx="0" cy="0" r="24" fill="#04020E"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.55"/>
    <g stroke="#E879F9" stroke-width="2.5" filter="url(#softGlow)">
      <line x1="0" y1="-18" x2="0" y2="-8"/>
      <line x1="0" y1="8" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="-8" y2="0"/>
      <line x1="8" y1="0" x2="18" y2="0"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#F0ABFC"/>
    <ellipse cx="-22" cy="-14" rx="8" ry="4" fill="#FFFFFF" opacity="0.10"
             transform="rotate(-30 -22 -14)"/>
  </g>

  <text x="256" y="492" text-anchor="middle"
        font-family="JetBrains Mono, Menlo, monospace"
        font-size="16" letter-spacing="4"
        fill="#6D28D9" opacity="0.5">datawatch</text>
</svg>
