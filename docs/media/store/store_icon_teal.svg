<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Teal variant: dark teal background, teal/cyan eye -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0A2E2E"/>
      <stop offset="60%" stop-color="#041A1A"/>
      <stop offset="100%" stop-color="#020D0D"/>
    </radialGradient>
    <radialGradient id="iris" cx="42%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Matrix rain dots — teal tint -->
  <g fill="#14B8A6" fill-opacity="0.35">
    <rect x="56"  y="48"  width="6" height="6"/>
    <rect x="56"  y="72"  width="6" height="6"/>
    <rect x="56"  y="96"  width="6" height="6"/>
    <rect x="56"  y="392" width="6" height="6"/>
    <rect x="56"  y="416" width="6" height="6"/>
    <rect x="56"  y="440" width="6" height="6"/>
    <rect x="112" y="40"  width="6" height="6"/>
    <rect x="112" y="64"  width="6" height="6"/>
    <rect x="112" y="88"  width="6" height="6"/>
    <rect x="112" y="400" width="6" height="6"/>
    <rect x="112" y="424" width="6" height="6"/>
    <rect x="112" y="448" width="6" height="6"/>
    <rect x="394" y="48"  width="6" height="6"/>
    <rect x="394" y="72"  width="6" height="6"/>
    <rect x="394" y="96"  width="6" height="6"/>
    <rect x="394" y="392" width="6" height="6"/>
    <rect x="394" y="416" width="6" height="6"/>
    <rect x="394" y="440" width="6" height="6"/>
    <rect x="450" y="40"  width="6" height="6"/>
    <rect x="450" y="64"  width="6" height="6"/>
    <rect x="450" y="88"  width="6" height="6"/>
    <rect x="450" y="400" width="6" height="6"/>
    <rect x="450" y="424" width="6" height="6"/>
    <rect x="450" y="448" width="6" height="6"/>
  </g>

  <!-- Sclera: wide almond, 380×240, centered at 256,256 -->
  <ellipse cx="256" cy="256" rx="190" ry="120" fill="#040E0E" stroke="#0D9488" stroke-width="3"/>

  <!-- Iris: r=104 -->
  <circle cx="256" cy="256" r="104" fill="url(#iris)"/>

  <!-- Iris ring details -->
  <circle cx="256" cy="256" r="99"  fill="none" stroke="#2DD4BF" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="76"  fill="none" stroke="#5EEAD4" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="42" fill="#020808"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#0D9488" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Crosshair — teal/cyan -->
  <line x1="256" y1="110" x2="256" y2="138" stroke="#67E8F9" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="374" x2="256" y2="402" stroke="#67E8F9" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="256" x2="138" y2="256" stroke="#67E8F9" stroke-width="4" stroke-linecap="round"/>
  <line x1="374" y1="256" x2="402" y2="256" stroke="#67E8F9" stroke-width="4" stroke-linecap="round"/>

  <!-- Center highlight -->
  <circle cx="256" cy="256" r="8" fill="#A7F3D0"/>

  <!-- Lens flare -->
  <ellipse cx="214" cy="218" rx="18" ry="8" fill="white" fill-opacity="0.2" transform="rotate(-20 214 218)"/>
</svg>
