<?xml version="1.0" encoding="UTF-8"?>
<!--
  Variant B6 — moon + Earthrise.

  Narrative: the tablet sits on the lunar surface; Earth rises just above the
  horizon; the antenna arcs emanate upward from the tablet toward Earth, telling
  the datawatch story ("watching Earth from the Moon, long-range"). Keeps the
  tablet + eye + matrix rain core from B5; swaps the dark radial-gradient disc
  for a cratered moonscape + space background + Earth-limb rise per the famous
  Apollo 8 "Earthrise" photograph.

  Palette preserves datawatch purple where identity matters (antenna arcs,
  crosshair, matrix rain); moon is muted warm grey; Earth is cyan/blue/white.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="datawatch — moon Earthrise (tablet on lunar surface)">
  <defs>
    <!-- Space background (star-field-ish). -->
    <radialGradient id="space" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#0A0518"/>
      <stop offset="70%" stop-color="#05010E"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Moon surface gradient — warm grey with a slight terminator shadow. -->
    <linearGradient id="moonSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A413A"/>
      <stop offset="55%" stop-color="#322A25"/>
      <stop offset="100%" stop-color="#1A1411"/>
    </linearGradient>

    <!-- Earth gradient — cloud whites, continent greens, ocean blues. -->
    <radialGradient id="earth" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#EAF6FF"/>
      <stop offset="25%" stop-color="#6AA3D8"/>
      <stop offset="55%" stop-color="#1E4B88"/>
      <stop offset="85%" stop-color="#0B2A55"/>
      <stop offset="100%" stop-color="#050F28"/>
    </radialGradient>

    <!-- Earth atmosphere halo. -->
    <radialGradient id="earthHalo" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#6AA3D8" stop-opacity="0"/>
      <stop offset="88%" stop-color="#6AA3D8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6AA3D8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241438"/>
      <stop offset="100%" stop-color="#0D0720"/>
    </linearGradient>

    <radialGradient id="screen" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#220F42"/>
      <stop offset="100%" stop-color="#08031A"/>
    </radialGradient>

    <radialGradient id="iris" cx="42%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="80%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>

    <linearGradient id="signalFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="matrixBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <!-- Clip the entire icon to a circle so it renders as an app-icon shape. -->
    <clipPath id="iconDisc">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>

    <clipPath id="screenClip">
      <rect x="96" y="172" width="320" height="248" rx="22" ry="22"/>
    </clipPath>

    <!-- Lunar horizon is a curved line — we carve the moon surface out of the
         space background with this path. Horizon rises subtly from left to right
         to suggest the moon's curvature relative to the camera. -->
    <clipPath id="lunarSurfaceClip">
      <path d="M 0,320 Q 256,305 512,330 L 512,512 L 0,512 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconDisc)">
    <!-- Space background fills the whole canvas; scatter of stars on top. -->
    <rect width="512" height="512" fill="url(#space)"/>

    <!-- Tiny stars — hand-placed so they don't overlap Earth or tablet silhouette. -->
    <g fill="#FFFFFF" opacity="0.7">
      <circle cx="40" cy="60" r="0.9"/>
      <circle cx="92" cy="42" r="0.6"/>
      <circle cx="148" cy="78" r="1.1"/>
      <circle cx="220" cy="36" r="0.7"/>
      <circle cx="300" cy="52" r="0.5"/>
      <circle cx="368" cy="74" r="1.0"/>
      <circle cx="432" cy="48" r="0.7"/>
      <circle cx="472" cy="92" r="0.9"/>
      <circle cx="76" cy="180" r="0.6"/>
      <circle cx="56" cy="232" r="0.8"/>
      <circle cx="28" cy="310" r="0.7" opacity="0.4"/>
      <circle cx="446" cy="186" r="0.6"/>
      <circle cx="478" cy="250" r="0.9"/>
      <circle cx="396" cy="118" r="0.5"/>
    </g>

    <!-- Earth — rising above the lunar horizon, cropped by horizon line at y~315.
         Centered high-right quadrant to feel like the Earthrise photo (Earth is
         small and offset, not dominant). -->
    <g>
      <!-- Atmosphere halo, slightly larger than Earth -->
      <circle cx="320" cy="230" r="92" fill="url(#earthHalo)"/>
      <!-- Earth body -->
      <circle cx="320" cy="230" r="76" fill="url(#earth)"/>
      <!-- Rough continent blobs (impressionistic; scaled for legibility at small sizes). -->
      <g fill="#2E6B3A" opacity="0.72">
        <path d="M 276,208 Q 286,202 296,212 Q 300,224 286,230 Q 276,226 272,216 Z"/>
        <path d="M 312,240 Q 328,232 344,246 Q 352,262 334,266 Q 318,260 312,252 Z"/>
        <path d="M 286,260 Q 300,258 310,272 Q 302,282 290,276 Q 280,268 286,260 Z"/>
      </g>
      <!-- Cloud swirl highlights. -->
      <g fill="#FFFFFF" opacity="0.38">
        <path d="M 262,232 Q 280,218 302,226 Q 290,238 270,240 Z"/>
        <path d="M 340,216 Q 356,220 360,234 Q 352,228 338,224 Z"/>
        <path d="M 306,282 Q 322,274 340,282 Q 324,292 306,288 Z"/>
      </g>
      <!-- Specular highlight. -->
      <ellipse cx="298" cy="204" rx="18" ry="9" fill="#FFFFFF" opacity="0.22"
               transform="rotate(-20 298 204)"/>
    </g>

    <!-- Lunar surface (foreground). Clipped to the horizon curve. -->
    <g clip-path="url(#lunarSurfaceClip)">
      <rect x="0" y="300" width="512" height="212" fill="url(#moonSurface)"/>

      <!-- Craters — radial gradients for shaded relief. Each crater is a
           rim-lit ring with a darker interior, giving a small 3D read. -->
      <g>
        <!-- crater A (large, left foreground) -->
        <ellipse cx="90" cy="402" rx="38" ry="12"
                 fill="#1C1612" opacity="0.55"/>
        <ellipse cx="90" cy="400" rx="36" ry="11"
                 fill="none" stroke="#5F5247" stroke-width="1.2" opacity="0.7"/>
        <!-- crater B (mid) -->
        <ellipse cx="200" cy="365" rx="22" ry="7"
                 fill="#1C1612" opacity="0.55"/>
        <ellipse cx="200" cy="364" rx="21" ry="6"
                 fill="none" stroke="#5F5247" stroke-width="1" opacity="0.7"/>
        <!-- crater C (under tablet, small) -->
        <ellipse cx="146" cy="440" rx="14" ry="5"
                 fill="#1C1612" opacity="0.55"/>
        <ellipse cx="146" cy="438" rx="13" ry="4"
                 fill="none" stroke="#5F5247" stroke-width="0.8" opacity="0.7"/>
        <!-- crater D (right-foreground large) -->
        <ellipse cx="394" cy="458" rx="46" ry="14"
                 fill="#1C1612" opacity="0.5"/>
        <ellipse cx="394" cy="456" rx="45" ry="13"
                 fill="none" stroke="#5F5247" stroke-width="1.2" opacity="0.7"/>
        <!-- crater E (right-mid) -->
        <ellipse cx="440" cy="372" rx="20" ry="7"
                 fill="#1C1612" opacity="0.45"/>
        <ellipse cx="440" cy="370" rx="19" ry="6"
                 fill="none" stroke="#5F5247" stroke-width="0.8" opacity="0.6"/>
        <!-- crater F (far-right tiny) -->
        <ellipse cx="470" cy="408" rx="10" ry="4"
                 fill="#1C1612" opacity="0.5"/>
        <!-- crater G (center-back) -->
        <ellipse cx="254" cy="324" rx="16" ry="5"
                 fill="#1C1612" opacity="0.5"/>
        <!-- crater H (bottom small cluster) -->
        <ellipse cx="50" cy="470" rx="18" ry="6" fill="#1C1612" opacity="0.5"/>
        <ellipse cx="70" cy="484" rx="10" ry="3" fill="#1C1612" opacity="0.5"/>
      </g>

      <!-- Surface granular noise — dots for regolith texture. -->
      <g fill="#5F5247" opacity="0.35">
        <circle cx="118" cy="350" r="0.9"/>
        <circle cx="160" cy="372" r="0.6"/>
        <circle cx="224" cy="344" r="0.7"/>
        <circle cx="272" cy="370" r="0.6"/>
        <circle cx="312" cy="354" r="0.8"/>
        <circle cx="356" cy="390" r="0.6"/>
        <circle cx="396" cy="346" r="0.7"/>
        <circle cx="76" cy="428" r="0.6"/>
        <circle cx="234" cy="462" r="0.8"/>
        <circle cx="318" cy="486" r="0.9"/>
      </g>

      <!-- Horizon rim highlight (subtle warm glow where Earthlight hits). -->
      <path d="M 0,316 Q 256,300 512,324"
            fill="none" stroke="#7A6657" stroke-width="1.4" opacity="0.55"/>
    </g>

    <!-- Antenna arcs — emanate upward from the tablet toward Earth, carrying
         the datawatch narrative ("data flowing from the moon to Earth"). -->
    <g fill="none" stroke="url(#signalFade)" stroke-linecap="round"
       filter="url(#softGlow)">
      <path d="M 196,172 A 60,60 0 0,1 316,172" stroke-width="10" opacity="0.95"/>
      <path d="M 166,158 A 90,90 0 0,1 346,158" stroke-width="8"  opacity="0.70"/>
      <path d="M 136,144 A 120,120 0 0,1 376,144" stroke-width="6" opacity="0.45"/>
    </g>

    <!-- Tablet body — sits on the moon surface. Slight downward shift so the
         bottom edge almost touches the crater-foreground. -->
    <rect x="80" y="208" width="352" height="260" rx="28" ry="28"
          fill="url(#bezel)" stroke="#7C3AED" stroke-width="3"/>
    <rect x="236" y="216" width="40" height="4" rx="2" ry="2" fill="#2D1B4E"/>
    <circle cx="256" cy="228" r="2.4" fill="#4C1D95" opacity="0.75"/>

    <!-- Screen recess (adjusted to new tablet position) -->
    <rect x="96" y="236" width="320" height="220" rx="18" ry="18"
          fill="url(#screen)" stroke="#4C1D95" stroke-width="1" opacity="0.95"/>

    <!-- Matrix rain (static representation — animation lives in B5 + Compose
         splash). Same column positions, less volume so the eye stays legible. -->
    <g clip-path="url(#screenClip)" filter="url(#matrixBlur)"
       font-family="JetBrains Mono, Menlo, monospace" font-size="12"
       letter-spacing="0.4" text-anchor="middle">
      <g fill="#A855F7">
        <text x="128" y="270" opacity="0.40">A</text>
        <text x="128" y="286" opacity="0.55">3</text>
        <text x="128" y="302" opacity="0.35">F</text>
        <text x="128" y="318" opacity="0.50">2</text>
        <text x="128" y="334" opacity="0.60">9</text>
        <text x="170" y="264" opacity="0.35">D</text>
        <text x="170" y="280" opacity="0.55">E</text>
        <text x="170" y="296" opacity="0.45">A</text>
        <text x="170" y="312" opacity="0.40">D</text>
        <text x="210" y="276" opacity="0.50">C</text>
        <text x="210" y="292" opacity="0.40">A</text>
        <text x="210" y="308" opacity="0.60">F</text>
        <text x="302" y="270" opacity="0.45">0</text>
        <text x="302" y="286" opacity="0.35">x</text>
        <text x="302" y="302" opacity="0.55">D</text>
        <text x="342" y="262" opacity="0.40">D</text>
        <text x="342" y="278" opacity="0.50">A</text>
        <text x="342" y="294" opacity="0.45">T</text>
        <text x="342" y="310" opacity="0.55">A</text>
        <text x="342" y="326" opacity="0.40">W</text>
        <text x="380" y="284" opacity="0.40">F</text>
        <text x="380" y="300" opacity="0.55">E</text>
        <text x="380" y="316" opacity="0.45">E</text>
        <text x="380" y="332" opacity="0.40">D</text>
      </g>
    </g>

    <!-- Eye — centered on screen -->
    <g transform="translate(256, 346)">
      <ellipse cx="0" cy="0" rx="110" ry="66" fill="#080518"
               stroke="#7C3AED" stroke-width="2"/>
      <circle cx="0" cy="0" r="56" fill="url(#iris)"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#A855F7"
              stroke-width="1" opacity="0.45"/>
      <circle cx="0" cy="0" r="24" fill="#04020E"/>
      <g stroke="#E879F9" stroke-width="2.6" filter="url(#softGlow)">
        <line x1="0" y1="-18" x2="0" y2="-9"/>
        <line x1="0" y1="9"   x2="0" y2="18"/>
        <line x1="-18" y1="0" x2="-9" y2="0"/>
        <line x1="9"   y1="0" x2="18" y2="0"/>
      </g>
      <circle cx="0" cy="0" r="4" fill="#F0ABFC"/>
      <ellipse cx="-26" cy="-16" rx="10" ry="5" fill="#FFFFFF" opacity="0.10"
               transform="rotate(-30 -26 -16)"/>
    </g>
  </g>
</svg>
